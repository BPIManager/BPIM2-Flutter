name: bpim2_flutter
description: "BPIM2 App"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon-192x192.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#260606"
  image: icon-192x192.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/scraper.js
