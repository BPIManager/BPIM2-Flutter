name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate icons & splash
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk bpim2-flutter-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bpim2-flutter-android.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate icons & splash
        run: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Package as ZIP
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath bpim2-flutter-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: bpim2-flutter-windows.zip

  release:
    name: Create GitHub Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## BPI Manager 2 Flutter App ${{ github.ref_name }}

            ### ダウンロード

            | プラットフォーム | ファイル |
            | --- | --- |
            | Android | `bpim2-flutter-android.apk` |
            | Windows | `bpim2-flutter-windows.zip` |

            ### インストール方法

            **Android**
            1. `bpim2-flutter-android.apk` をダウンロード
            2. 「提供元不明のアプリ」のインストールを許可
            3. APK をタップしてインストール

            **Windows**
            1. `bpim2-flutter-windows.zip` をダウンロードして解凍
            2. `bpim2_flutter.exe` を実行

            > この APK はデバッグ証明書で署名されています。詳しくは [README](https://github.com/${{ github.repository }}/blob/main/README.md) のセキュリティ注意事項をご確認ください。
          files: |
            dist/bpim2-flutter-android.apk
            dist/bpim2-flutter-windows.zip
          draft: false
          prerelease: false
